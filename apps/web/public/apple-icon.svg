<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ChairBack">
  <defs>
    <linearGradient id="cbGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1DD8C"/>
      <stop offset="0.5" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#B8962F"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed charcoal; iOS rounds the corners itself for the home screen. -->
  <rect width="180" height="180" fill="#0E0E10"/>
  <!-- Same Lucide scissors mark as icon.svg, centered with generous iOS padding.
       24-grid scaled x5 and centered: translate(30,30) puts the 120px icon in
       the middle of the 180 tile. -->
  <g transform="translate(30 30) scale(5)" stroke="url(#cbGold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <circle cx="6" cy="6" r="3"/>
    <circle cx="6" cy="18" r="3"/>
    <path d="M8.12 8.12 20 20"/>
    <path d="M14.47 14.48 20 4"/>
    <path d="M8.12 15.88 12 12"/>
  </g>
</svg>
