<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0E1830"/>
      <stop offset="1" stop-color="#0A101F"/>
    </linearGradient>
    <linearGradient id="pole" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B8CFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5B8CFF" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg4)"/>
  <!-- The classic: barber-pole diagonals -->
  <g transform="rotate(-24 300 300)">
    <rect x="60" y="150" width="480" height="34" rx="17" fill="url(#pole)"/>
    <rect x="60" y="234" width="480" height="34" rx="17" fill="#E9EFFC" opacity="0.5"/>
    <rect x="60" y="318" width="480" height="34" rx="17" fill="url(#pole)"/>
    <rect x="60" y="402" width="480" height="34" rx="17" fill="#E9EFFC" opacity="0.5"/>
  </g>
</svg>
