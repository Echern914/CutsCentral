    <rect x="90" y="120" width="420" height="52" rx="10" fill="#5B8CFF" opacity="0.85"/>
    <rect x="90" y="192" width="420" height="52" rx="10" fill="#5B8CFF" opacity="0.62"/>
    <rect x="90" y="264" width="420" height="52" rx="10" fill="#5B8CFF" opacity="0.42"/>
    <rect x="90" y="336" width="420" height="52" rx="10" fill="#5B8CFF" opacity="0.26"/>
    <rect x="90" y="408" width="420" height="52" rx="10" fill="#5B8CFF" opacity="0.12"/>
  </g>
</svg>
