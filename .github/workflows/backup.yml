name: Backup to Cloudflare R2

# Off-site backup of the prod Postgres DB + Supabase Storage photos → Cloudflare R2.
# Runs nightly, and can be triggered by hand from the Actions tab.
#
# All credentials come from GitHub repo Secrets (Settings → Secrets and variables →
# Actions). See docs/BACKUP.md for exactly which secrets to create and where each
# value comes from. Nothing here is sensitive on its own.

on:
  schedule:
    # 07:15 UTC daily ≈ 03:15 ET — a quiet hour for a US barbershop app.
    - cron: "15 7 * * *"
  workflow_dispatch: {} # manual "Run workflow" button

# Never let two backups overlap (a long dump + a manual run).
concurrency:
  group: r2-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (for the backup script)
        uses: actions/checkout@v4

      - name: Install pg_dump v17 client + rclone
        run: |
          set -euo pipefail
          # Supabase prod runs Postgres 17, and pg_dump refuses to dump a server
          # NEWER than itself. Ubuntu's default client lags (v16), so pin the PGDG
          # v17 client explicitly. Keep this >= the Supabase server major version.
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17 rclone
          # The PGDG package installs pg_dump 17 under /usr/lib/postgresql/17/bin;
          # make sure THAT one is first on PATH (not Ubuntu's older /usr/bin one).
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          # Fail loudly if we didn't actually get v17 (silent fallback was the bug).
          ver="$(pg_dump --version | grep -oE '[0-9]+' | head -1)"
          echo "pg_dump major version: ${ver}"
          if [ "${ver}" -lt 17 ]; then
            echo "::error::expected pg_dump >= 17 but got ${ver}" >&2
            exit 1
          fi
          rclone version | head -1

      - name: Compute UTC stamp
        id: stamp
        run: echo "value=$(date -u +%Y/%m/%d/%H%M%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run backup
        env:
          BACKUP_STAMP: ${{ steps.stamp.outputs.value }}
          PROD_DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          SUPABASE_S3_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          SUPABASE_S3_REGION: ${{ secrets.SUPABASE_S3_REGION }}
          SUPABASE_S3_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
          SUPABASE_S3_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          RETENTION_DAYS: ${{ vars.BACKUP_RETENTION_DAYS || '30' }}
        run: bash scripts/backup/run-backup.sh
